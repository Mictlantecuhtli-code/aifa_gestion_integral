<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIFA Gestión Integral - Inicio de sesión</title>
  <link rel="stylesheet" href="assets/css/main.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script type="module" src="assets/js/auth.js" defer></script>
</head>
<body class="theme-light">
  <main class="layout layout--center">
    <section class="card card--shadow auth-card">
      <header class="card__header">
        <h1 class="brand">AIFA Gestión Integral</h1>
        <p class="card__subtitle">Panel administrativo</p>
      </header>
      <form id="login-form" class="form form--vertical" autocomplete="on">
        <div class="form__field">
          <label for="email">Correo institucional</label>
          <input id="email" name="email" type="email" inputmode="email" placeholder="correo@aifa.gob.mx" required />
        </div>
        <div class="form__field">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>
        <div class="form__actions">
          <button class="btn btn--primary" type="submit" aria-label="Iniciar sesión en el sistema">
            Iniciar sesión
          </button>
        </div>
        <p class="form__hint" role="status" aria-live="polite" id="form-hint"></p>
      </form>
    </section>
  </main>
</body>
</html>
